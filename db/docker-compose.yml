services:
  mysql:
    image: mysql:8.0
    container_name: marcelo_chavan_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: marcelo_chavan
      MYSQL_USER: mcuser
      MYSQL_PASSWORD: mcpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - mc_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: marcelo_chavan_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: mcuser
      PMA_PASSWORD: mcpassword
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mc_network

volumes:
  mysql_data:
    driver: local

networks:
  mc_network:
    driver: bridge
